<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Bílina BMX Racing – DUST & CRASH</title>
    <style>
        body { background-color: #111; margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui, #timer, #win-screen, #start-screen, #crash-msg { position: absolute; color: white; border-radius: 12px; pointer-events: none; }
        #ui { top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #444; z-index: 50; }
        #timer { top: 10px; right: 10px; text-align: right; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #444; z-index: 50; }
        #start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 200; pointer-events: auto; }
        #logo-img { max-width: 80%; max-height: 60%; margin-bottom: 30px; }
        .blink { animation: blinker 1.5s linear infinite; font-size: 20px; color: #ffca28; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }
        #win-screen { display: none; top: 50%; left: 50%; transform: translate(-50%, -50%); min-width: 320px; text-align: center; pointer-events: auto; background: rgba(0,0,0,0.95); padding: 30px; border: 3px solid #ffca28; z-index: 150; }
        
        /* UPRAVENÉ OKNO PÁDU */
        #crash-msg { 
            display: none; top: 75%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(20, 0, 0, 0.95); padding: 25px; border-radius: 15px; border: 4px solid #ff4444; 
            text-align: center; z-index: 300; min-width: 400px; box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);
        }
        .rozsekal-ses { 
            color: #ff0000; font-size: 48px; font-weight: 900; margin-bottom: 10px; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .key { background: #fff; color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        #timeDisplay { font-size: 32px; font-weight: bold; color: #0f0; }
    </style>
</head>
<body>

<div id="start-screen" onclick="startHry()">
    <img id="logo-img" src="logo_2.png" alt="Bílina BMX Logo">
    <div class="blink">STISKNI LIBOVOLNOU KLÁVESU PRO START</div>
</div>

<div id="ui">ŠLAPEJ: <span class="key">MEZERNÍK</span> | ZATÁČEJ: <span class="key">← →</span> | RESET: <span class="key">R</span></div>
<div id="timer">ČAS: <span id="timeDisplay">00:00</span><div id="recordDisplay" style="font-size: 14px; opacity: 0.6;">REKORD: --:--</div></div>

<div id="crash-msg">
    <div class="rozsekal-ses">ROZSEKAL SES !!!</div>
    <p style="font-size: 18px; margin: 10px 0;">VYJEL JSI MIMO TRAŤ.</p>
    <p>Pro návrat na start stiskni <span class="key">R</span></p>
</div>

<div id="win-screen"><h1>🏆 CÍL PROJET!</h1><div id="finalTimeVal">00:00</div><div id="newRecordMsg" style="color: #0f0; display: none;">✨ NOVÝ REKORD! ✨</div><button onclick="resetZavodu()">JET ZNOVU (R)</button></div>

<canvas id="herniPlatno"></canvas>

<script>
    const canvas = document.getElementById('herniPlatno'), ctx = canvas.getContext('2d');
    const timeDisplay = document.getElementById('timeDisplay'), recordDisplay = document.getElementById('recordDisplay');
    const crashMsg = document.getElementById('crash-msg'), winScreen = document.getElementById('win-screen'), startScreen = document.getElementById('start-screen');
    
    let mapaReady = false;
    const mapa = new Image(); mapa.src = 'mapa.png'; mapa.onload = () => { mapaReady = true; };
    const imgJezdec1 = new Image(); imgJezdec1.src = 'jezdec_1.png';
    const imgJezdec2 = new Image(); imgJezdec2.src = 'jezdec_2.png';

    const START_X = 77, START_Y = 168;
    let hrac = { x: START_X, y: START_Y, rychlost: 0, uhel: 1.4, maxRychlost: 7.5, silaSlapnuti: 0.45, zakladniRotace: 0.055, treni: 0.988, spadl: false, vyral: false, beziStopky: false, hraBezi: false, casStartu: 0 };

    let prach = [];
    let aktualniTrasa = [], nejlepsiTrasa = [], intervalZaznamu = null;

    try {
        const d = localStorage.getItem('bmx_ghost_data');
        if (d) nejlepsiTrasa = JSON.parse(d);
    } catch(e) {}

    let nejlepsiCas = localStorage.getItem('bmx_rekord_final');
    if (nejlepsiCas) recordDisplay.innerText = "REKORD: " + format(parseInt(nejlepsiCas));

    const klavesy = {};
    function startHry() { if (!hrac.hraBezi) { hrac.hraBezi = true; startScreen.style.display = "none"; } }

    function vytvorPrach(x, y, uhel) {
        const pocet = 8 + Math.random() * 4;
        const zadniKoloX = x - Math.cos(uhel) * 30;
        const zadniKoloY = y - Math.sin(uhel) * 30;
        for (let i = 0; i < pocet; i++) {
            prach.push({
                x: zadniKoloX, y: zadniKoloY,
                vx: -Math.cos(uhel + (Math.random() - 0.5) * 0.5) * (1 + Math.random() * 2),
                vy: -Math.sin(uhel + (Math.random() - 0.5) * 0.5) * (1 + Math.random() * 2),
                zivotnost: 20 + Math.random() * 15,
                velikost: 2 + Math.random() * 3
            });
        }
    }

    window.addEventListener('keydown', (e) => {
        if (!hrac.hraBezi) { startHry(); return; }
        if (e.code === 'KeyR') resetZavodu();
        if (hrac.spadl || hrac.vyral) return;
        if (e.code === 'Space') {
            if (hrac.rychlost < hrac.maxRychlost) hrac.rychlost += hrac.silaSlapnuti;
            if (hrac.rychlost > 0.5) vytvorPrach(hrac.x, hrac.y, hrac.uhel);
            if (!hrac.beziStopky && hrac.y > 200) {
                hrac.casStartu = Date.now(); hrac.beziStopky = true; aktualniTrasa = [];
                if (intervalZaznamu) clearInterval(intervalZaznamu);
                intervalZaznamu = setInterval(() => { if(hrac.beziStopky) aktualniTrasa.push({x: hrac.x, y: hrac.y, u: hrac.uhel}); }, 100);
            }
        }
        klavesy[e.code] = true;
    });
    window.addEventListener('keyup', (e) => klavesy[e.code] = false);

    function resetZavodu() {
        hrac.x = START_X; hrac.y = START_Y; hrac.rychlost = 0; hrac.uhel = 1.4; hrac.spadl = false; hrac.vyral = false; hrac.beziStopky = false;
        aktualniTrasa = []; prach = []; if (intervalZaznamu) clearInterval(intervalZaznamu);
        crashMsg.style.display = "none"; winScreen.style.display = "none"; document.getElementById('newRecordMsg').style.display = "none";
        timeDisplay.innerText = "00:00";
    }

    function format(ms) {
        const s = Math.floor(ms / 1000), m = Math.floor((ms % 1000) / 10);
        return s.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
    }

    function isPointInPoly(pt, poly) {
        let x = pt.x, y = pt.y, inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            let xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
            let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    let polygony = [{"points":[{"x":191,"y":251},{"x":320,"y":544},{"x":376,"y":676},{"x":438,"y":744},{"x":494,"y":780},{"x":582,"y":826},{"x":672,"y":871},{"x":743,"y":911},{"x":754,"y":895},{"x":648,"y":790},{"x":535,"y":663},{"x":408,"y":519},{"x":293,"y":384},{"x":211,"y":266},{"x":194,"y":221},{"x":196,"y":155},{"x":211,"y":125},{"x":231,"y":111},{"x":275,"y":94},{"x":311,"y":87},{"x":356,"y":97},{"x":383,"y":119},{"x":404,"y":149},{"x":429,"y":201},{"x":449,"y":232},{"x":447,"y":173},{"x":432,"y":112},{"x":411,"y":86},{"x":378,"y":65},{"x":353,"y":55},{"x":300,"y":56},{"x":254,"y":61},{"x":210,"y":77},{"x":166,"y":95},{"x":140,"y":109},{"x":158,"y":153},{"x":177,"y":202}]},{"points":[{"x":148,"y":58},{"x":9,"y":125},{"x":262,"y":764},{"x":297,"y":805},{"x":363,"y":856},{"x":463,"y":906},{"x":654,"y":993},{"x":732,"y":1027},{"x":801,"y":1036},{"x":851,"y":1018},{"x":878,"y":990},{"x":894,"y":944},{"x":885,"y":889},{"x":873,"y":878},{"x":910,"y":882},{"x":941,"y":870},{"x":961,"y":852},{"x":986,"y":807},{"x":986,"y":763},{"x":976,"y":723},{"x":953,"y":678},{"x":816,"y":545},{"x":596,"y":265},{"x":802,"y":113},{"x":1007,"y":230},{"x":1049,"y":548},{"x":1048,"y":952},{"x":1032,"y":1049},{"x":856,"y":1096},{"x":517,"y":1089},{"x":303,"y":1026},{"x":51,"y":875},{"x":6,"y":760},{"x":-4,"y":377},{"x":-40,"y":39},{"x":40,"y":45}]},{"points":[{"x":484,"y":292},{"x":870,"y":784},{"x":881,"y":772},{"x":492,"y":284}]},{"points":[{"x":325,"y":221},{"x":751,"y":774},{"x":312,"y":233}]}];
    const CIL = {x: 480, y: 240, w: 100, h: 80};

    function herniSmycka() {
        if (hrac.hraBezi && !hrac.spadl && !hrac.vyral) {
            let rot = hrac.zakladniRotace * Math.min(hrac.rychlost / 3, 1.2);
            if (klavesy['ArrowLeft']) hrac.uhel -= rot;
            if (klavesy['ArrowRight']) hrac.uhel += rot;
            hrac.rychlost *= hrac.treni;
            hrac.x += Math.cos(hrac.uhel) * hrac.rychlost;
            hrac.y += Math.sin(hrac.uhel) * hrac.rychlost;

            polygony.forEach(poly => { if (isPointInPoly({x: hrac.x, y: hrac.y}, poly.points)) { hrac.spadl = true; hrac.beziStopky = false; crashMsg.style.display = "block"; clearInterval(intervalZaznamu); } });
            if (hrac.beziStopky && hrac.x > CIL.x && hrac.x < CIL.x + CIL.w && hrac.y > CIL.y && hrac.y < CIL.y + CIL.h) {
                const konec = Date.now() - hrac.casStartu; hrac.beziStopky = false; hrac.vyral = true; clearInterval(intervalZaznamu);
                winScreen.style.display = "block"; document.getElementById('finalTimeVal').innerText = "Tvůj čas: " + format(konec);
                if (!nejlepsiCas || konec < nejlepsiCas) { 
                    nejlepsiCas = konec; nejlepsiTrasa = [...aktualniTrasa]; 
                    localStorage.setItem('bmx_rekord_final', konec); localStorage.setItem('bmx_ghost_data', JSON.stringify(nejlepsiTrasa)); 
                    recordDisplay.innerText = "REKORD: " + format(konec); document.getElementById('newRecordMsg').style.display = "block"; 
                }
            }
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let camX = canvas.width / 2 - hrac.x, camY = canvas.height / 2 - hrac.y;
        ctx.save(); ctx.translate(camX, camY);
        if (mapaReady) ctx.drawImage(mapa, 0, 0);

        ctx.fillStyle = "rgba(160, 120, 80, 0.6)";
        for (let i = prach.length - 1; i >= 0; i--) {
            let p = prach[i]; p.x += p.vx; p.y += p.vy; p.zivotnost--;
            let aktVelikost = p.velikost * (p.zivotnost / 35);
            if (aktVelikost > 0.1 && p.zivotnost > 0) { ctx.beginPath(); ctx.arc(p.x, p.y, aktVelikost, 0, Math.PI * 2); ctx.fill(); } else { prach.splice(i, 1); }
        }

        if (hrac.beziStopky && nejlepsiTrasa.length > 0) {
            let idx = Math.floor((Date.now() - hrac.casStartu) / 100);
            if (idx < nejlepsiTrasa.length) {
                let g = nejlepsiTrasa[idx]; ctx.save(); ctx.translate(g.x, g.y); ctx.rotate(g.u + Math.PI / 2); ctx.globalAlpha = 0.35;
                if (imgJezdec1.complete) ctx.drawImage(imgJezdec1, -17, -35, 35, 70); ctx.restore();
            }
        }
        ctx.restore();

        ctx.save(); ctx.translate(hrac.x + camX, hrac.y + camY);
        if (hrac.spadl) { if (imgJezdec2.complete) ctx.drawImage(imgJezdec2, -70, -70, 140, 140); }
        else { ctx.rotate(hrac.uhel + Math.PI / 2); if (imgJezdec1.complete) ctx.drawImage(imgJezdec1, -17, -35, 35, 70); }
        ctx.restore();

        if (hrac.beziStopky) timeDisplay.innerText = format(Date.now() - hrac.casStartu);
        requestAnimationFrame(herniSmycka);
    }

    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    herniSmycka();
</script>
</body>
</html>
